id: samsungce.bladeFilter
version: 1
status: proposed
name: Blade Filter
ephemeral: false
attributes:
  bladeFilterStatus:
    schema:
      type: object
      properties:
        value:
          type: string
          enum:
            - normal
            - replace
            - wash
            - notused
      additionalProperties: false
      required:
        - value
    enumCommands: []
  bladeFilterLastResetDate:
    schema:
      type: object
      properties:
        value:
          type: string
          pattern: ^(?:[1-9]\d{3}-?(?:(?:0[1-9]|1[0-2])-?(?:0[1-9]|1\d|2[0-8])|(?:0[13-9]|1[0-2])-?(?:29|30)|(?:0[13578]|1[02])-?31)|(?:[1-9]\d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-?02-?29)T(?:[01]\d|2[0-3]):?[0-5]\d:?[0-5]\d(?:\.\d{3})?(?:Z|[+-][01]\d(?::?[0-5]\d)?)$
      additionalProperties: false
      required: []
    enumCommands: []
  bladeFilterUsage:
    schema:
      type: object
      properties:
        value:
          type: integer
          minimum: 0
          maximum: 100
      additionalProperties: false
      required:
        - value
    enumCommands: []
  bladeFilterResetType:
    schema:
      type: object
      properties:
        value:
          type: array
          items:
            type: string
            enum:
              - replaceable
              - washable
              - notresetable
      additionalProperties: false
      required:
        - value
    enumCommands: []
  bladeFilterUsageStep:
    schema:
      type: object
      properties:
        value:
          type: integer
          minimum: 1
          maximum: 100
      additionalProperties: false
      required:
        - value
    enumCommands: []
  bladeFilterCapacity:
    schema:
      type: object
      properties:
        value:
          type: integer
        unit:
          type: string
          enum:
            - CC
            - Cycle
            - Gallon
            - Hour
            - Month
      additionalProperties: false
      required:
        - value
        - unit
    enumCommands: []
commands:
  resetBladeFilter:
    name: resetBladeFilter
    arguments: []
    sensitive: false
